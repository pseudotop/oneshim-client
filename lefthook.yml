# lefthook.yml — Git hooks for oneshim-client
# Install: lefthook install

pre-push:
  commands:
    pre-release-check:
      # Runs only when pushing a version tag (v*)
      run: |
        # Read pushed refs from stdin
        while read local_ref local_sha remote_ref remote_sha; do
          # Match tag pushes: refs/tags/v*
          case "$remote_ref" in
            refs/tags/v*)
              TAG_VERSION="${remote_ref#refs/tags/v}"
              echo "🏷️  Tag push detected: v${TAG_VERSION}"
              echo ""
              ./scripts/pre-release-check.sh "$TAG_VERSION"
              ;;
          esac
        done
      interactive: true
    tauri-e2e-smoke:
      # Runs Tauri webview smoke test on version tag push (macOS only)
      run: |
        while read local_ref local_sha remote_ref remote_sha; do
          case "$remote_ref" in
            refs/tags/v*)
              if [ "$(uname)" != "Darwin" ]; then
                echo "⏭️  Tauri E2E smoke: skipped (macOS only)"
                exit 0
              fi
              BINARY="target/debug/oneshim"
              if [ ! -f "$BINARY" ]; then
                echo "⏭️  Tauri E2E smoke: skipped (binary not built with webdriver feature)"
                exit 0
              fi
              FRONTEND_DIR="crates/oneshim-web/frontend"
              if [ ! -d "$FRONTEND_DIR/node_modules/@wdio" ]; then
                echo "⏭️  Tauri E2E smoke: skipped (@wdio not installed)"
                exit 0
              fi
              echo "🧪 Running Tauri E2E smoke test..."
              cd "$FRONTEND_DIR" && npx wdio run e2e-tauri/wdio.conf.ts --reporter=spec
              ;;
          esac
        done
      interactive: true

pre-commit:
  parallel: true
  commands:
    cargo-fmt:
      glob: "*.rs"
      run: cargo fmt --check
    cargo-clippy:
      glob: "*.rs"
      run: cargo clippy --workspace --quiet -- -D warnings
      stage_fixed: true
