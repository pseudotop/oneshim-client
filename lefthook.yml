# lefthook.yml — Git hooks for oneshim-client
# Install: lefthook install

pre-push:
  commands:
    pre-release-check:
      # Runs on: (1) version tag push (v*), (2) release branch push (release/v*)
      run: |
        source ./scripts/release-common.sh
        while read local_ref local_sha remote_ref remote_sha; do
          case "$remote_ref" in
            refs/tags/v*)
              TAG_VERSION="${remote_ref#refs/tags/v}"
              echo "🏷️  Tag push detected: v${TAG_VERSION}"
              echo ""
              ./scripts/pre-release-check.sh "$TAG_VERSION"
              ;;
            refs/heads/release/v*-rc.*)
              # Extract version from branch name: release/v0.4.2-rc.1 -> 0.4.2-rc.1
              BRANCH_VERSION="${remote_ref#refs/heads/release/v}"
              BASE="$(base_version "$BRANCH_VERSION")"
              if git tag -l "v${BASE}" | grep -q "^v${BASE}$"; then
                echo "❌ release branch v${BRANCH_VERSION}: stable tag v${BASE} already exists"
                echo "   Hint: use next patch version (e.g. v$(next_patch_version "$BASE")-rc.1)"
                exit 1
              fi
              echo "✅ release branch v${BRANCH_VERSION}: no conflicting stable tag"
              ;;
          esac
        done
      interactive: true
    tauri-e2e-smoke:
      # Runs Tauri webview smoke test on version tag push (macOS only)
      run: |
        while read local_ref local_sha remote_ref remote_sha; do
          case "$remote_ref" in
            refs/tags/v*)
              if [ "$(uname)" != "Darwin" ]; then
                echo "⏭️  Tauri E2E smoke: skipped (macOS only)"
                exit 0
              fi
              BINARY="target/debug/oneshim"
              if [ ! -f "$BINARY" ]; then
                echo "⏭️  Tauri E2E smoke: skipped (binary not built with webdriver feature)"
                exit 0
              fi
              FRONTEND_DIR="crates/oneshim-web/frontend"
              if [ ! -d "$FRONTEND_DIR/node_modules/@wdio" ]; then
                echo "⏭️  Tauri E2E smoke: skipped (@wdio not installed)"
                exit 0
              fi
              echo "🧪 Running Tauri E2E smoke test..."
              cd "$FRONTEND_DIR" && npx wdio run e2e-tauri/wdio.conf.ts --reporter=spec
              ;;
          esac
        done
      interactive: true
    web-e2e:
      # Runs the web dashboard Playwright suite when the diff being pushed
      # touches frontend source/e2e/build files. Catches routing regressions
      # locally so we don't burn ~27min CI cycles on a /audit-style bug.
      #
      # Skipping:
      #   ONESHIM_AGENT=subagent → skip (used by non-interactive agents)
      #   No frontend changes in pushed diff → skip (sub-second early-out)
      #
      # Cost when it does run: ~3s build + ~75s playwright = ~80s.
      run: |
        if [ "$ONESHIM_AGENT" = "subagent" ]; then
          echo "⏭️  web-e2e: skipped (subagent mode)"
          exit 0
        fi

        FRONTEND_DIR="crates/oneshim-web/frontend"
        if [ ! -d "$FRONTEND_DIR/node_modules" ]; then
          echo "⏭️  web-e2e: skipped (node_modules not installed)"
          exit 0
        fi

        # Determine the diff to inspect: every (local_sha, remote_sha) pair on
        # stdin. For a brand-new branch remote_sha is all-zeros, so fall back
        # to comparing against origin/main.
        ZERO="0000000000000000000000000000000000000000"
        FRONTEND_TOUCHED=0
        while read local_ref local_sha remote_ref remote_sha; do
          if [ "$remote_sha" = "$ZERO" ]; then
            BASE=$(git merge-base "$local_sha" origin/main 2>/dev/null || echo "")
            [ -z "$BASE" ] && BASE=$(git rev-list --max-parents=0 "$local_sha" | tail -1)
          else
            BASE="$remote_sha"
          fi
          CHANGED=$(git diff --name-only "$BASE" "$local_sha" -- \
            "$FRONTEND_DIR/src/" \
            "$FRONTEND_DIR/e2e/" \
            "$FRONTEND_DIR/playwright.config.ts" \
            "$FRONTEND_DIR/package.json" \
            "$FRONTEND_DIR/vite.config.ts" \
            "$FRONTEND_DIR/tsconfig.json" 2>/dev/null || true)
          if [ -n "$CHANGED" ]; then
            FRONTEND_TOUCHED=1
            break
          fi
        done

        if [ "$FRONTEND_TOUCHED" -eq 0 ]; then
          echo "⏭️  web-e2e: skipped (no frontend changes in push)"
          exit 0
        fi

        if [ ! -d "$HOME/Library/Caches/ms-playwright" ] && [ ! -d "$HOME/.cache/ms-playwright" ]; then
          echo "⚠️  web-e2e: playwright browser cache missing"
          echo "    Run: cd $FRONTEND_DIR && pnpm exec playwright install chromium"
          exit 1
        fi

        echo "🧪 Running web dashboard Playwright suite (frontend changes detected)..."
        cd "$FRONTEND_DIR" && pnpm verify:web-e2e
      interactive: true

post-checkout:
  commands:
    cargo-sweep:
      run: |
        if command -v cargo-sweep >/dev/null 2>&1 && [ -d target ]; then
          cargo sweep --time 7 2>/dev/null
        fi

post-merge:
  commands:
    cargo-sweep:
      run: |
        if command -v cargo-sweep >/dev/null 2>&1 && [ -d target ]; then
          cargo sweep --time 7 2>/dev/null
        fi

pre-commit:
  parallel: true
  commands:
    conflict-markers:
      # Prevent committing unresolved merge conflicts (checks staged source files only)
      run: |
        MARKERS=$(git diff --cached --name-only -- '*.rs' '*.ts' '*.tsx' '*.js' '*.json' '*.toml' '*.md' | xargs grep -ln '^<<<<<<< \|^=======$\|^>>>>>>> ' 2>/dev/null || true)
        if [ -n "$MARKERS" ]; then
          echo "❌ Unresolved merge conflict markers found:"
          echo "$MARKERS"
          exit 1
        fi
    monitor-loop-size:
      # Prevent monitor loop from exceeding 500 lines (extract helpers instead)
      glob: "src-tauri/src/scheduler/loops/monitor.rs"
      run: |
        LINES=$(wc -l < src-tauri/src/scheduler/loops/monitor.rs)
        if [ "$LINES" -gt 500 ]; then
          echo "❌ monitor.rs is $LINES lines (max 500). Extract into a helper."
          exit 1
        fi
    web-contracts:
      glob: "crates/oneshim-web/src/{routes,handlers/**}.rs"
      run: ./scripts/verify-web-contract-boundary.sh && ./scripts/verify-http-interface-manifest.sh && ./scripts/verify-http-openapi-sync.sh
    cargo-fmt:
      glob: "*.rs"
      run: cargo fmt --check
    cargo-clippy:
      glob: "*.rs"
      run: |
        if [ "$ONESHIM_AGENT" = "subagent" ]; then
          echo "clippy: skipped (subagent mode)"
          exit 0
        fi
        cargo clippy --workspace --all-targets --quiet -- -D warnings
      stage_fixed: true
    route-integrity:
      glob: "crates/oneshim-web/frontend/src/{routes,pages,components/shell}/**/*.{ts,tsx}"
      run: ./scripts/verify-route-integrity.sh
    frontend-typecheck:
      glob: "*.{ts,tsx}"
      run: |
        FRONTEND_DIR="crates/oneshim-web/frontend"
        if [ ! -d "$FRONTEND_DIR/node_modules" ]; then
          echo "frontend-typecheck: skipped (node_modules not installed)"
          exit 0
        fi
        cd "$FRONTEND_DIR" && npx tsc --noEmit
