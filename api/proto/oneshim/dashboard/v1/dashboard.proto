// D13: Dashboard gRPC service — exposed by oneshim-web for external CLI/integration tools.
//
// Unlike `oneshim.client.v1.*` which is the CONSUMER contract (client-rust talks to server),
// this service is what oneshim-web SERVES to external clients on the local dashboard port.
//
// Per the D13 design spec (docs/superpowers/specs/2026-04-21-d13-grpc-web-exposure-design.md),
// v1 ships with a minimal RPC set (GetAgentInfo + HealthCheck). Future PRs expand per-domain
// (frames, events, sessions) to reach REST-parity.

syntax = "proto3";

package oneshim.dashboard.v1;

service DashboardService {
  // Basic agent identity + uptime. Mirrors the REST /api/agent/info endpoint.
  rpc GetAgentInfo(GetAgentInfoRequest) returns (AgentInfoResponse);

  // Dashboard-specific health check. Use this instead of the standard
  // grpc.health.v1.Health/Check when you want readiness semantics beyond
  // "process is alive" — e.g., "storage accessible, scheduler running".
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);

  // D13-v2a: per-domain read RPCs.
  // Aggregated session statistics. Mirrors REST `GET /api/sessions/stats`.
  rpc GetSessionStats(GetSessionStatsRequest) returns (SessionStatsResponse);
  // Recent frame metadata. Mirrors REST `GET /api/frames?limit=N`.
  rpc GetRecentFrames(GetRecentFramesRequest) returns (RecentFramesResponse);
  // Hourly productivity metric rollups. Mirrors REST
  // `GET /api/metrics/hourly?from=...`.
  rpc GetProductivityMetrics(GetProductivityMetricsRequest) returns (ProductivityMetricsResponse);
  // Focus aggregates over the last N days. Mirrors REST `GET /api/focus/stats`.
  rpc GetFocusStats(GetFocusStatsRequest) returns (FocusStatsResponse);
}

message GetAgentInfoRequest {}

message AgentInfoResponse {
  // Cargo package version, e.g. "0.4.39-rc.1".
  string version = 1;
  // "release" or "debug" based on the build profile.
  string build_profile = 2;
  // Seconds since the agent process started.
  int64 uptime_secs = 3;
  // OS family: "macos", "windows", "linux".
  string platform = 4;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  enum Status {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
  }

  Status status = 1;
  // Optional human-readable reason when status != SERVING.
  string message = 2;
}

// D13-v2a: GetSessionStats. Aggregated over the most recent `limit` sessions
// returned by `WebStorage::list_session_stats`. When `limit == 0`, the server
// uses 1000 as the default sample size.
message GetSessionStatsRequest {
  uint32 limit = 1;
}

message SessionStatsResponse {
  // Number of sessions aggregated.
  uint32 total_sessions = 1;
  // Count of sessions whose `ended_at` is set.
  uint32 ended_sessions = 2;
  // Average completed-session duration in seconds. 0 when no sessions are
  // yet ended.
  double avg_duration_secs = 3;
  // Total events across the aggregated sessions.
  uint64 total_events = 4;
  // Total frames across the aggregated sessions.
  uint64 total_frames = 5;
  // Total idle seconds across the aggregated sessions.
  uint64 total_idle_secs = 6;
}

// D13-v2a: GetRecentFrames. Returns frame metadata (no image bytes) for
// recent captures. Image bytes are served separately via the existing REST
// file handler to keep gRPC responses bounded.
message GetRecentFramesRequest {
  // Max frames to return. 0 → default 50. Hard-capped at 500.
  uint32 limit = 1;
  // Hours to look back. 0 → default 1. Hard-capped at 168 (7 days).
  uint32 since_hours = 2;
}

message RecentFramesResponse {
  repeated FrameMetadata frames = 1;

  message FrameMetadata {
    int64 frame_id = 1;
    string captured_at = 2;  // RFC 3339
    string trigger_type = 3;
    string app_name = 4;
    string window_title = 5;
    float importance = 6;
    uint32 resolution_w = 7;
    uint32 resolution_h = 8;
    // File path is intentionally omitted — dashboard clients fetch image
    // bytes over REST; exposing the path here would leak FS layout.
  }
}

// D13-v2a: GetProductivityMetrics. Hourly CPU/memory rollups within an
// inclusive [from, now] window.
message GetProductivityMetricsRequest {
  // Hours to look back from now. 0 → default 24. Hard-capped at 168.
  uint32 since_hours = 1;
}

message ProductivityMetricsResponse {
  repeated HourlyMetrics buckets = 1;

  message HourlyMetrics {
    string hour = 1;  // RFC 3339 hour-start
    double cpu_avg = 2;
    double cpu_max = 3;
    uint64 memory_avg = 4;
    uint64 memory_max = 5;
    uint64 sample_count = 6;
  }
}

// D13-v2a: GetFocusStats. Focus aggregates over the last N days.
message GetFocusStatsRequest {
  // Days to look back. 0 → default 7. Hard-capped at 90.
  uint32 days = 1;
}

message FocusStatsResponse {
  // Number of daily buckets returned.
  uint32 bucket_count = 1;
  // Sum of `total_active_secs` across returned buckets.
  uint64 total_active_secs = 2;
  // Sum of `deep_work_secs` across returned buckets.
  uint64 total_deep_work_secs = 3;
  // Sum of `communication_secs` across returned buckets.
  uint64 total_communication_secs = 4;
  // Sum of `interruption_count` across returned buckets.
  uint32 total_interruptions = 5;
  // Average `focus_score` across returned buckets. 0 when no data.
  float avg_focus_score = 6;
  // Max `max_focus_duration_secs` across returned buckets.
  uint64 longest_focus_secs = 7;
}
