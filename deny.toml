[graph]
all-features = true

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "MIT",
  "MPL-2.0",
  "NCSA",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  # --- Tauri v2 (iced → Tauri 마이그레이션) ---
  "LGPL-2.1-only",  # webkit2gtk (Linux only, 동적 링크)
  "OpenSSL",        # openssl-sys (일부 플랫폼)
]
private = { ignore = true }

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
unmaintained = "workspace"
unsound = "all"
ignore = [
  # gtk-rs GTK3 bindings — unmaintained but required by Tauri (wry → webkit2gtk/tao)
  # These are transitive deps we cannot control until Tauri migrates to GTK4
  "RUSTSEC-2024-0411", # gdkwayland-sys
  "RUSTSEC-2024-0412", # gdk
  "RUSTSEC-2024-0413", # atk
  "RUSTSEC-2024-0414", # gtk (or related)
  "RUSTSEC-2024-0416", # atk-sys
  "RUSTSEC-2024-0417", # gdkx11
  "RUSTSEC-2024-0418", # gdk-sys
  # fxhash — unmaintained, transitive dep from wry → kuchikiki → selectors
  "RUSTSEC-2025-0057", # fxhash
]

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
