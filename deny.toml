[graph]
all-features = true

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "MIT",
  "MPL-2.0",
  "NCSA",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  # --- Tauri v2 (iced → Tauri 마이그레이션) ---
  "LGPL-2.1-only",  # webkit2gtk (Linux only, 동적 링크)
  "OpenSSL",        # openssl-sys (일부 플랫폼)
]
private = { ignore = true }

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
unmaintained = "warn"
unsound = "deny"
ignore = []

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
