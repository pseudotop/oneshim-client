[graph]
all-features = true

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "MIT",
  "MPL-2.0",
  "NCSA",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "bzip2-1.0.6",    # libbz2-rs-sys (zip crate transitive dep)
  "Unlicense",      # whisper-rs / whisper-rs-sys (오디오 STT, OSI approved + FSF Free)
  # --- Tauri v2 (iced → Tauri 마이그레이션) ---
  "LGPL-2.1-only",  # webkit2gtk (Linux only, 동적 링크)
  "OpenSSL",        # openssl-sys (일부 플랫폼)
]
private = { ignore = true }

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
# GTK3 bindings (Tauri transitive deps) trigger unmaintained + unsound advisories
# (RUSTSEC-2024-0411..0418, 2025-0057, 2024-0429) we cannot control upstream.
# RUSTSEC-2026-0097 is a rand 0.7.x build-time transitive advisory currently
# reached through Tauri HTML/build tooling, not the runtime graph.
# "none"/"workspace" — skip transitive dep checks, only guard our own crates.
unmaintained = "none"
unsound = "workspace"
yanked = "deny"
# Review-by: 2026-08-01 — re-evaluate each entry below for upstream
# resolution status. Replace the inline ignore with a fix when possible.
ignore = [
  # glib 0.18.x advisory in the Tauri/Wry GTK runtime stack. Linux release
  # artifacts are deferred (.github/workflows/release.yml) until upstream
  # patches the runtime path. Source builds remain available.
  { id = "RUSTSEC-2024-0429", reason = "Tauri/Wry GTK glib 0.18.x — Linux release artifacts deferred upstream" },
  # rand 0.7.x build-time transitive (Tauri HTML/build tooling). Not in
  # the runtime graph; safe to defer until Tauri bumps the build chain.
  { id = "RUSTSEC-2026-0097", reason = "rand 0.7 build tooling, transitive only (Tauri HTML/build chain)" },
]

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
