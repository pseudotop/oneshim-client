name: Release Notes

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release-notes:
    name: Update GitHub Release body
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate release notes for this tag
        run: git-cliff --latest --strip header -o RELEASE_NOTES.md

      - name: Update GitHub Release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [ -s RELEASE_NOTES.md ]; then
            gh release edit "$TAG_NAME" --notes-file RELEASE_NOTES.md 2>/dev/null || \
              echo "Release for $TAG_NAME not found yet — notes will be added by release workflow"
          fi
