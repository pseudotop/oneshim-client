name: Update Changelog

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CHANGELOG.md'   # avoid infinite loop

permissions:
  contents: write

jobs:
  update-changelog:
    name: Regenerate [Unreleased]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git-cliff needs full history

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Update [Unreleased] section
        run: git-cliff --unreleased --prepend CHANGELOG.md

      - name: Commit if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(changelog): update [Unreleased] [skip ci]"
          file_pattern: CHANGELOG.md
