name: macOS WindowServer GUI Smoke

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to run (branch, tag, or SHA). Empty uses current commit."
        required: false
        default: ""
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: macos-windowserver-gui-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gui-windowserver-smoke:
    name: GUI Bootstrap Smoke (WindowServer)
    runs-on: [self-hosted, macOS, windowserver]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-windowserver-gui-smoke

      - name: Build release binary
        run: ./scripts/cargo-cache.sh build --release -p oneshim-app

      - name: GUI bootstrap smoke (WindowServer)
        shell: bash
        run: |
          set -euo pipefail

          BIN="target/release/oneshim"
          LOG="$RUNNER_TEMP/oneshim-windowserver-smoke.log"
          test -x "$BIN"

          set +e
          "$BIN" --offline --gui >"$LOG" 2>&1 &
          PID=$!
          sleep 12
          if kill -0 "$PID" >/dev/null 2>&1; then
            kill "$PID" >/dev/null 2>&1 || true
          fi
          wait "$PID"
          RC=$?
          set -e

          if grep -qE "Cannot start a runtime from within a runtime|Cannot drop a runtime|panicked|panic|Abort trap|SIGABRT|CGSConnectionByID|CGAtomicGet\\(&is_initialized\\)" "$LOG"; then
            echo "GUI bootstrap smoke detected runtime/panic/windowserver failure"
            cat "$LOG"
            exit 1
          fi

          if [[ "$RC" -ne 0 && "$RC" -ne 143 ]]; then
            echo "GUI bootstrap smoke exited unexpectedly: rc=$RC"
            cat "$LOG"
            exit 1
          fi

      - name: Upload WindowServer GUI smoke log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: windowserver-gui-smoke-log
          path: ${{ runner.temp }}/oneshim-windowserver-smoke.log
          if-no-files-found: ignore
