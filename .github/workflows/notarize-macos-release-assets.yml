name: Notarize macOS Release Assets

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to notarize (e.g. v0.0.10)"
        required: true
        type: string
      source_run_id:
        description: "Release workflow run id that produced DMG/PKG artifacts (optional)"
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  notarize-macos-assets:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: macos-latest
    timeout-minutes: 180
    env:
      GH_TOKEN: ${{ github.token }}
      MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
      MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
      MACOS_NOTARY_APP_PASSWORD: ${{ secrets.MACOS_NOTARY_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve release tag and source run id
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
          DISPATCH_SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          WORKFLOW_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_run" ]]; then
            RELEASE_TAG="$WORKFLOW_HEAD_BRANCH"
            SOURCE_RUN_ID="$WORKFLOW_RUN_ID"
          else
            RELEASE_TAG="${DISPATCH_TAG:-}"
            SOURCE_RUN_ID="${DISPATCH_SOURCE_RUN_ID:-}"
          fi

          if [[ -z "$RELEASE_TAG" || "$RELEASE_TAG" != v* ]]; then
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi

          if [[ -z "$SOURCE_RUN_ID" ]]; then
            SOURCE_RUN_ID="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow release.yml \
              --branch "$RELEASE_TAG" \
              --limit 30 \
              --json databaseId,status,conclusion,event \
              | jq -r '[.[] | select(.event == "push" and .status == "completed" and .conclusion == "success")][0].databaseId // empty')"
          fi

          if [[ -z "$SOURCE_RUN_ID" ]]; then
            echo "Unable to resolve a successful release run for tag $RELEASE_TAG" >&2
            exit 1
          fi

          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "SOURCE_RUN_ID=$SOURCE_RUN_ID" >> "$GITHUB_ENV"
          echo "Resolved RELEASE_TAG=$RELEASE_TAG SOURCE_RUN_ID=$SOURCE_RUN_ID"

      - name: Validate notarization secrets
        shell: bash
        run: |
          required=(
            MACOS_NOTARY_APPLE_ID
            MACOS_NOTARY_TEAM_ID
            MACOS_NOTARY_APP_PASSWORD
          )
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required secret: $key" >&2
              exit 1
            fi
          done

      - name: Download macOS installer artifacts from release run
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          gh run download "$SOURCE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name oneshim-macos-universal-dmg \
            --dir dist
          gh run download "$SOURCE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name oneshim-macos-universal-pkg \
            --dir dist
          find dist -mindepth 2 -type f \( -name '*.dmg' -o -name '*.pkg' \) -exec mv {} dist/ \;
          find dist -mindepth 1 -type d -empty -delete
          ls -la dist
          test -f dist/oneshim-macos-universal-unsigned.dmg
          test -f dist/oneshim-macos-universal-unsigned.pkg

      - name: Configure notarization keychain profile
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/oneshim-notary.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          xcrun notarytool store-credentials "oneshim-notary" \
            --keychain "$KEYCHAIN_PATH" \
            --apple-id "$MACOS_NOTARY_APPLE_ID" \
            --team-id "$MACOS_NOTARY_TEAM_ID" \
            --password "$MACOS_NOTARY_APP_PASSWORD"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Notarize and staple DMG and PKG
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/notary-submit-and-poll.sh \
            dist/oneshim-macos-universal-unsigned.dmg \
            "$KEYCHAIN_PATH" \
            "oneshim-notary" \
            "10800" \
            "60"
          bash ./scripts/notary-submit-and-poll.sh \
            dist/oneshim-macos-universal-unsigned.pkg \
            "$KEYCHAIN_PATH" \
            "oneshim-notary" \
            "10800" \
            "60"
          xcrun stapler staple dist/oneshim-macos-universal-unsigned.dmg
          xcrun stapler staple dist/oneshim-macos-universal-unsigned.pkg
          cp dist/oneshim-macos-universal-unsigned.dmg dist/oneshim-macos-universal.dmg
          cp dist/oneshim-macos-universal-unsigned.pkg dist/oneshim-macos-universal.pkg
          spctl --assess --type open --verbose=4 dist/oneshim-macos-universal.dmg
          spctl --assess --type install --verbose=4 dist/oneshim-macos-universal.pkg

      - name: Upload notarization logs artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: oneshim-macos-notary-logs-${{ env.RELEASE_TAG }}
          path: dist/notary-logs/*.json
          if-no-files-found: ignore

      - name: Replace release assets with notarized installers
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            dist/oneshim-macos-universal.dmg \
            dist/oneshim-macos-universal.pkg \
            --clobber \
            --repo "$GITHUB_REPOSITORY"

      - name: Cleanup notary keychain
        if: always()
        shell: bash
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
