name: Security & Compliance

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 1'

env:
  CARGO_TERM_COLOR: always

jobs:
  supply-chain:
    name: Supply Chain Controls
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libnotify-dev \
            libasound2-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libclang-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install tooling
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked
          cargo install cargo-vet --locked
          cargo install cargo-about --locked
          cargo install cargo-cyclonedx --locked

      - name: RustSec audit
        run: cargo audit

      - name: License/advisory/source policy
        run: cargo deny check licenses advisories sources bans

      - name: Supply-chain policy (cargo-vet)
        run: cargo vet check

      - name: Generate third-party notice
        run: cargo about generate --workspace --offline --threshold 1.0 --config about.toml about.hbs > THIRD_PARTY_NOTICES.html

      - name: Generate SBOM (CycloneDX)
        run: |
          mkdir -p artifacts/sbom
          find crates -name 'sbom.cdx.json' -delete
          cargo cyclonedx --format json --override-filename sbom.cdx --manifest-path Cargo.toml

          sbom_count=0
          while IFS= read -r sbom_path; do
            crate_name="$(basename "$(dirname "${sbom_path}")")"
            cp "${sbom_path}" "artifacts/sbom/${crate_name}.sbom.cdx.json"
            sbom_count=$((sbom_count + 1))
          done < <(find crates -name 'sbom.cdx.json' | sort)

          if [ "${sbom_count}" -eq 0 ]; then
            echo "No SBOM files were generated by cargo-cyclonedx" >&2
            exit 1
          fi

      - name: Upload compliance artifacts
        uses: actions/upload-artifact@v6
        with:
          name: compliance-artifacts
          path: |
            THIRD_PARTY_NOTICES.html
            artifacts/sbom/*.json
