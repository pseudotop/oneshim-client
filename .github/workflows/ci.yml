name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  changes:
    name: Change Detection
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - '!crates/oneshim-web/frontend/**'
              - 'src-tauri/**'
              - 'scripts/**'
              - 'debian/**'
            frontend:
              - 'crates/oneshim-web/frontend/**'
            ci:
              - '.github/workflows/**'
              - '.github/actions/**'

  frontend:
    name: Frontend (build + e2e)
    needs: [changes]
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: crates/oneshim-web/frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: crates/oneshim-web/frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend bundle
        working-directory: crates/oneshim-web/frontend
        run: pnpm build

      - name: Verify frontend build output
        run: test -f crates/oneshim-web/frontend/dist/index.html

      - name: Install Playwright browser
        working-directory: crates/oneshim-web/frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run web dashboard E2E tests
        working-directory: crates/oneshim-web/frontend
        run: pnpm test:e2e

      - name: Upload Playwright report artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: frontend-playwright-artifacts
          path: |
            crates/oneshim-web/frontend/playwright-report
            crates/oneshim-web/frontend/test-results
          if-no-files-found: warn
          retention-days: 14

      - name: Package frontend dist artifact
        run: tar -czf crates/oneshim-web/frontend/frontend-dist.tar.gz -C crates/oneshim-web/frontend dist

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist-bundle
          path: crates/oneshim-web/frontend/frontend-dist.tar.gz
          if-no-files-found: error

  check:
    name: Check (fmt + clippy)
    needs: [changes]
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.rust == 'true' ||
      needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libnotify-dev \
            libasound2-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libclang-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-check

      - name: Check formatting
        run: ./scripts/cargo-cache.sh fmt --all -- --check

      - name: Verify web contract boundary
        run: ./scripts/verify-web-contract-boundary.sh

      - name: Verify HTTP interface manifest
        run: ./scripts/verify-http-interface-manifest.sh

      - name: Verify HTTP OpenAPI snapshot sync
        run: ./scripts/verify-http-openapi-sync.sh

      - name: Generate HTTP OpenAPI snapshot
        run: ./scripts/generate-http-openapi.sh dist/oneshim-web.v1.openapi.yaml

      - name: Upload HTTP OpenAPI snapshot artifact
        uses: actions/upload-artifact@v6
        with:
          name: oneshim-web-v1-openapi
          path: dist/oneshim-web.v1.openapi.yaml
          if-no-files-found: error

      - name: Verify commit message hygiene
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.sha }}
        run: ./scripts/verify-commit-message-hygiene.sh "$PR_BASE_SHA" "$HEAD_SHA"

      - name: Run clippy (standalone)
        run: ./scripts/cargo-cache.sh clippy --workspace --all-targets -- -D warnings -A clippy::empty_docs -A clippy::derivable_impls -A clippy::type_complexity

      - name: Run clippy (server features)
        run: ./scripts/cargo-cache.sh clippy --workspace --all-targets --features server -- -D warnings -A clippy::empty_docs -A clippy::derivable_impls -A clippy::type_complexity

      - name: Run clippy (grpc features)
        run: ./scripts/cargo-cache.sh clippy --workspace --all-targets --features grpc -- -D warnings -A clippy::empty_docs -A clippy::derivable_impls -A clippy::type_complexity

  perf-gates:
    name: Performance Gates
    needs: [changes, check]
    if: >
      (github.event_name == 'workflow_dispatch' || github.event_name == 'push') &&
      (needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true')
    runs-on: ubuntu-latest
    env:
      ONESHIM_ENABLE_PERF_GATES: '1'
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libnotify-dev \
            libasound2-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libclang-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-perf-gates

      - name: Run automation perf gate tests
        run: ./scripts/cargo-cache.sh test --release -p oneshim-automation perf_budget_ -- --nocapture

      - name: Run vision perf gate tests
        run: ./scripts/cargo-cache.sh test --release -p oneshim-vision perf_budget_ -- --nocapture

  test:
    name: Test
    needs: [changes, check]
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.rust == 'true' ||
      needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libnotify-dev \
            libasound2-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libclang-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test

      - name: Run tests (standalone)
        run: ./scripts/cargo-cache.sh test --workspace

      - name: Run tests (server features)
        run: ./scripts/cargo-cache.sh test --workspace --features server

      - name: Run tests (grpc features)
        run: ./scripts/cargo-cache.sh test --workspace --features grpc

  build-pr-smoke:
    name: Build PR Smoke (${{ matrix.name }})
    needs: [changes, test]
    if: >
      github.event_name == 'pull_request' &&
      (needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
          - name: macos-x64
            os: macos-14
            target: x86_64-apple-darwin
          - name: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Try to download frontend dist artifact
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: frontend-dist-bundle
          path: crates/oneshim-web/frontend

      - name: Extract frontend dist artifact if present
        shell: bash
        run: |
          if [ -f crates/oneshim-web/frontend/frontend-dist.tar.gz ]; then
            tar -xzf crates/oneshim-web/frontend/frontend-dist.tar.gz -C crates/oneshim-web/frontend
          fi
          test -f crates/oneshim-web/frontend/dist/index.html

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libnotify-dev \
            libasound2-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libclang-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Verify DEB metadata assets
        if: runner.os == 'Linux'
        run: ./scripts/verify-deb-metadata.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-build-pr-${{ matrix.target }}

      - name: Build release (PR smoke)
        shell: bash
        run: ./scripts/cargo-cache.sh build --release --target ${{ matrix.target }}

      - name: Binary smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/oneshim"
          test -x "$BIN"
          FILE_INFO="$(file "$BIN")"
          echo "Binary: $FILE_INFO"
          case "$(uname -s)" in
            Darwin) echo "$FILE_INFO" | grep -qE "Mach-O|universal" ;;
            Linux)  echo "$FILE_INFO" | grep -qE "ELF" ;;
          esac

      - name: Binary smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/oneshim.exe"
          if (!(Test-Path $bin)) {
            throw "binary missing: $bin"
          }
          $sz = (Get-Item $bin).Length
          if ($sz -lt 1MB) { throw "binary too small: $sz bytes" }
          Write-Host "Binary OK: $bin ($([math]::Round($sz / 1MB, 1)) MB)"

      - name: GUI bootstrap smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/oneshim.exe"
          $outLog = Join-Path $env:RUNNER_TEMP "oneshim-pr-gui-smoke-win.out.log"
          $errLog = Join-Path $env:RUNNER_TEMP "oneshim-pr-gui-smoke-win.err.log"
          $mergedLog = Join-Path $env:RUNNER_TEMP "oneshim-pr-gui-smoke-win.log"

          # Tauri is a GUI app — launch briefly and check for panics
          $proc = Start-Process -FilePath $bin -PassThru -WindowStyle Hidden -RedirectStandardOutput $outLog -RedirectStandardError $errLog
          Start-Sleep -Seconds 3

          if (-not $proc.HasExited) {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            Wait-Process -Id $proc.Id -ErrorAction SilentlyContinue
          }

          $stdout = if (Test-Path $outLog) { Get-Content $outLog -Raw } else { "" }
          $stderr = if (Test-Path $errLog) { Get-Content $errLog -Raw } else { "" }
          $combined = "$stdout`n$stderr"
          Set-Content -Path $mergedLog -Value $combined

          # Fatal: Rust panics or tokio runtime double-init
          $panicPattern = "Cannot start a runtime from within a runtime|Cannot drop a runtime|panicked at|SIGABRT|stack backtrace"
          if ($combined -match $panicPattern) {
            Write-Host "GUI bootstrap smoke detected runtime/panic failure"
            if (Test-Path $outLog) { Get-Content $outLog }
            if (Test-Path $errLog) { Get-Content $errLog }
            exit 1
          }
          Write-Host "GUI bootstrap smoke OK (rc=$($proc.ExitCode))"

      - name: GUI bootstrap smoke (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/oneshim"
          LOG="$RUNNER_TEMP/oneshim-pr-gui-smoke.log"

          # Tauri is a GUI app — launch briefly and check for panics.
          # On headless CI, display/WebKit failures are expected.
          set +e
          ONESHIM_DISABLE_TRAY=1 "$BIN" >"$LOG" 2>&1 &
          PID=$!
          sleep 3
          if kill -0 "$PID" >/dev/null 2>&1; then
            kill "$PID" >/dev/null 2>&1 || true
          fi
          wait "$PID"
          RC=$?
          set -e

          # Fatal: Rust panics or tokio runtime double-init
          if grep -qE "Cannot start a runtime from within a runtime|Cannot drop a runtime|panicked at|SIGABRT|stack backtrace" "$LOG"; then
            echo "GUI bootstrap smoke detected runtime/panic failure"
            cat "$LOG"
            exit 1
          fi

          # Only flag segfault/abort crashes; other exits are expected on headless CI
          if [[ "$RC" -eq 139 || "$RC" -eq 134 ]]; then
            echo "GUI bootstrap smoke crashed: rc=$RC"
            cat "$LOG"
            exit 1
          fi

          echo "GUI bootstrap smoke OK (rc=$RC)"

      - name: Upload macOS GUI smoke log
        if: always() && runner.os == 'macOS'
        uses: actions/upload-artifact@v6
        with:
          name: pr-gui-smoke-log-${{ matrix.name }}
          path: ${{ runner.temp }}/oneshim-pr-gui-smoke.log
          if-no-files-found: ignore

      - name: Upload Windows GUI smoke log
        if: always() && runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: pr-gui-smoke-log-${{ matrix.name }}
          path: |
            ${{ runner.temp }}/oneshim-pr-gui-smoke-win.log
            ${{ runner.temp }}/oneshim-pr-gui-smoke-win.out.log
            ${{ runner.temp }}/oneshim-pr-gui-smoke-win.err.log
          if-no-files-found: ignore

  build:
    name: Build (${{ matrix.target }})
    needs: [changes, test]
    if: >
      github.event_name != 'pull_request' &&
      (github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.rust == 'true' ||
      needs.changes.outputs.ci == 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: oneshim-macos-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            artifact_name: oneshim-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: oneshim-windows-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: oneshim-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Try to download frontend dist artifact
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: frontend-dist-bundle
          path: crates/oneshim-web/frontend

      - name: Extract frontend dist artifact if present
        shell: bash
        run: |
          if [ -f crates/oneshim-web/frontend/frontend-dist.tar.gz ]; then
            tar -xzf crates/oneshim-web/frontend/frontend-dist.tar.gz -C crates/oneshim-web/frontend
          fi
          test -f crates/oneshim-web/frontend/dist/index.html

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libnotify-dev \
            libasound2-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libclang-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Verify DEB metadata assets
        if: runner.os == 'Linux'
        run: ./scripts/verify-deb-metadata.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-build-${{ matrix.target }}

      - name: Build release
        shell: bash
        run: ./scripts/cargo-cache.sh build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../${{ matrix.artifact_name }}.tar.gz oneshim

      - name: Package (Windows zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/oneshim.exe -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.zip
          if-no-files-found: ignore
