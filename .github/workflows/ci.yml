name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  frontend:
    name: Frontend (build + e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: crates/oneshim-web/frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: crates/oneshim-web/frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend bundle
        working-directory: crates/oneshim-web/frontend
        run: pnpm build

      - name: Verify frontend build output
        run: test -f crates/oneshim-web/frontend/dist/index.html

      - name: Install Playwright browser
        working-directory: crates/oneshim-web/frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run web dashboard E2E tests
        working-directory: crates/oneshim-web/frontend
        run: pnpm test:e2e

      - name: Upload Playwright report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-artifacts
          path: |
            crates/oneshim-web/frontend/playwright-report
            crates/oneshim-web/frontend/test-results
          if-no-files-found: warn
          retention-days: 14

      - name: Package frontend dist artifact
        run: tar -czf crates/oneshim-web/frontend/frontend-dist.tar.gz -C crates/oneshim-web/frontend dist

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-bundle
          path: crates/oneshim-web/frontend/frontend-dist.tar.gz
          if-no-files-found: error

  check:
    name: Check (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libnotify-dev \
            libasound2-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libclang-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-check

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  perf-gates:
    name: Performance Gates
    needs: [check]
    runs-on: ubuntu-latest
    env:
      ONESHIM_ENABLE_PERF_GATES: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libnotify-dev \
            libasound2-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libclang-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-perf-gates

      - name: Run automation perf gate tests
        run: cargo test --release -p oneshim-automation perf_budget_ -- --nocapture

      - name: Run vision perf gate tests
        run: cargo test --release -p oneshim-vision perf_budget_ -- --nocapture

  test:
    name: Test
    needs: [check, frontend, perf-gates]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libnotify-dev \
            libasound2-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libclang-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test

      - name: Run tests
        run: cargo test --workspace

  build:
    name: Build (${{ matrix.target }})
    needs: [test, frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: oneshim-macos-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            artifact_name: oneshim-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: oneshim-windows-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: oneshim-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist artifact
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist-bundle
          path: crates/oneshim-web/frontend

      - name: Extract frontend dist artifact
        shell: bash
        run: |
          tar -xzf crates/oneshim-web/frontend/frontend-dist.tar.gz -C crates/oneshim-web/frontend
          test -f crates/oneshim-web/frontend/dist/index.html

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libnotify-dev \
            libasound2-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libclang-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Verify DEB metadata assets
        if: runner.os == 'Linux'
        run: ./scripts/verify-deb-metadata.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-build-${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../${{ matrix.artifact_name }}.tar.gz oneshim

      - name: Package (Windows zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/oneshim.exe -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.zip
          if-no-files-found: ignore
