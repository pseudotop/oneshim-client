name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  verify-version:
    name: Verify Version Consistency
    runs-on: ubuntu-latest
    env:
      TAG_REF: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Verify Cargo.toml version matches tag
        run: |
          TAG_VERSION="${TAG_REF#v}"
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "Tag version:   $TAG_VERSION"
          echo "Cargo version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch! Tag ${TAG_REF} but Cargo.toml has $CARGO_VERSION"
            echo "Fix: Update [workspace.package] version in Cargo.toml to \"$TAG_VERSION\""
            exit 1
          fi

      - name: Verify CHANGELOG.md has entry for this version
        run: |
          TAG_VERSION="${TAG_REF#v}"
          if ! grep -q "## \[$TAG_VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing entry for [$TAG_VERSION]"
            echo "Fix: Add ## [$TAG_VERSION] - $(date +%Y-%m-%d) section to CHANGELOG.md"
            exit 1
          fi

  build-frontend-assets:
    name: Build Frontend Assets
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: crates/oneshim-web/frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: crates/oneshim-web/frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend bundle
        working-directory: crates/oneshim-web/frontend
        run: pnpm build

      - name: Verify frontend build output
        run: test -f crates/oneshim-web/frontend/dist/index.html

      - name: Package frontend dist artifact
        run: tar -czf crates/oneshim-web/frontend/frontend-dist.tar.gz -C crates/oneshim-web/frontend dist

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist-bundle
          path: crates/oneshim-web/frontend/frontend-dist.tar.gz
          if-no-files-found: error

  build-release:
    name: Build Release (${{ matrix.target }})
    needs: build-frontend-assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: oneshim-macos-arm64
            asset_ext: tar.gz
          - os: macos-14
            target: x86_64-apple-darwin
            artifact_name: oneshim-macos-x64
            asset_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: oneshim-windows-x64
            asset_ext: zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: oneshim-linux-x64
            asset_ext: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Download frontend dist artifact
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist-bundle
          path: crates/oneshim-web/frontend

      - name: Extract frontend dist artifact
        shell: bash
        run: |
          tar -xzf crates/oneshim-web/frontend/frontend-dist.tar.gz -C crates/oneshim-web/frontend
          test -f crates/oneshim-web/frontend/dist/index.html

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libnotify-dev \
            libasound2-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libclang-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Verify DEB metadata assets
        if: runner.os == 'Linux'
        run: ./scripts/verify-deb-metadata.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      - name: Build release
        shell: bash
        run: ./scripts/cargo-cache.sh build --release --target ${{ matrix.target }} -p oneshim-app --features grpc

      - name: Validate WiX assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path "crates/oneshim-app/wix/main.wxs")) {
            Write-Error "Missing WiX manifest: crates/oneshim-app/wix/main.wxs"
            exit 1
          }
          if (!(Test-Path "crates/oneshim-app/wix/license.rtf")) {
            Write-Error "Missing WiX license file: crates/oneshim-app/wix/license.rtf"
            exit 1
          }

      # ── MSI 인스톨러 (Windows only) ──
      - name: Install cargo-wix
        if: runner.os == 'Windows'
        shell: bash
        run: ./scripts/cargo-cache.sh install cargo-wix

      - name: Build MSI installer
        if: runner.os == 'Windows'
        shell: bash
        working-directory: crates/oneshim-app
        run: ../../scripts/cargo-cache.sh wix -p oneshim-app --nocapture --target ${{ matrix.target }}

      # ── DEB 패키지 (Linux only) ──
      - name: Install cargo-deb
        if: runner.os == 'Linux'
        run: ./scripts/cargo-cache.sh install cargo-deb

      - name: Build DEB package
        if: runner.os == 'Linux'
        run: ./scripts/cargo-cache.sh deb -p oneshim-app --target ${{ matrix.target }} --no-build

      # ── 패키징 ──
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../dist/${{ matrix.artifact_name }}.${{ matrix.asset_ext }} oneshim

      - name: Package (Windows zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path target/${{ matrix.target }}/release/oneshim.exe -DestinationPath dist/${{ matrix.artifact_name }}.${{ matrix.asset_ext }}

      - name: Generate checksums
        if: runner.os != 'Windows'
        run: |
          cd dist
          shasum -a 256 ${{ matrix.artifact_name }}.${{ matrix.asset_ext }} > ${{ matrix.artifact_name }}.${{ matrix.asset_ext }}.sha256

      - name: Generate checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = Get-FileHash -Algorithm SHA256 -Path "dist/${{ matrix.artifact_name }}.${{ matrix.asset_ext }}"
          "$($hash.Hash.ToLower())  ${{ matrix.artifact_name }}.${{ matrix.asset_ext }}" | Out-File -Encoding ascii "dist/${{ matrix.artifact_name }}.${{ matrix.asset_ext }}.sha256"

      - name: Upload zip/tar artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}-archive
          path: |
            dist/${{ matrix.artifact_name }}.${{ matrix.asset_ext }}
            dist/${{ matrix.artifact_name }}.${{ matrix.asset_ext }}.sha256
          if-no-files-found: error

      - name: Verify MSI version
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          $expectedVersion = $env:TAG_REF -replace '^v', ''
          $msiFile = Get-ChildItem -Path "target/wix","crates/oneshim-app/target/wix" -Filter "*.msi" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $msiFile) { Write-Error "No MSI file found"; exit 1 }
          $msiName = $msiFile.Name
          Write-Host "MSI file: $msiName"
          if ($msiName -notmatch $expectedVersion.Replace('.', '-')) {
            if ($msiName -match "0\.0\.1" -and $expectedVersion -ne "0.0.1") {
              Write-Error "MSI version mismatch: file=$msiName expected=$expectedVersion"
              exit 1
            }
          }
          Write-Host "MSI version check passed"

      - name: Verify DEB version
        if: runner.os == 'Linux'
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          EXPECTED_VERSION="${TAG_REF#v}"
          DEB_FILE=$(find target -name "*.deb" -type f | head -1)
          if [ -z "$DEB_FILE" ]; then echo "No DEB file found"; exit 1; fi
          DEB_VERSION=$(dpkg-deb -f "$DEB_FILE" Version)
          echo "DEB file: $(basename $DEB_FILE)"
          echo "DEB version: $DEB_VERSION"
          echo "Expected: $EXPECTED_VERSION"
          DEB_UPSTREAM="${DEB_VERSION%%-*}"
          if [ "$DEB_UPSTREAM" != "$EXPECTED_VERSION" ]; then
            echo "::error::DEB version mismatch: got $DEB_VERSION (upstream $DEB_UPSTREAM), expected $EXPECTED_VERSION"
            exit 1
          fi

      - name: Upload MSI artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: oneshim-windows-x64-msi
          path: |
            target/wix/*.msi
            crates/oneshim-app/target/wix/*.msi
          if-no-files-found: error

      - name: Upload DEB artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: oneshim-linux-x64-deb
          path: target/${{ matrix.target }}/debian/*.deb
          if-no-files-found: error

  build-macos-universal:
    name: Build macOS Universal Binary
    needs: build-release
    runs-on: macos-latest
    timeout-minutes: 120
    env:
      MACOS_APP_CERT_P12_B64: ${{ secrets.MACOS_APP_CERT_P12_B64 }}
      MACOS_APP_CERT_PASSWORD: ${{ secrets.MACOS_APP_CERT_PASSWORD }}
      MACOS_INSTALLER_CERT_P12_B64: ${{ secrets.MACOS_INSTALLER_CERT_P12_B64 }}
      MACOS_INSTALLER_CERT_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERT_PASSWORD }}
      MACOS_APP_SIGNING_IDENTITY: ${{ secrets.MACOS_APP_SIGNING_IDENTITY }}
      MACOS_INSTALLER_SIGNING_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGNING_IDENTITY }}
    steps:
      - uses: actions/checkout@v6

      - name: Download arm64 artifact
        uses: actions/download-artifact@v7
        with:
          name: oneshim-macos-arm64-archive
          path: artifacts/arm64

      - name: Download x64 artifact
        uses: actions/download-artifact@v7
        with:
          name: oneshim-macos-x64-archive
          path: artifacts/x64

      - name: Verify architecture archives
        shell: bash
        run: |
          test -f artifacts/arm64/oneshim-macos-arm64.tar.gz
          test -f artifacts/x64/oneshim-macos-x64.tar.gz

      - name: Extract binaries
        run: |
          mkdir -p binaries
          tar -xzf artifacts/arm64/oneshim-macos-arm64.tar.gz -C binaries
          mv binaries/oneshim binaries/oneshim-arm64
          tar -xzf artifacts/x64/oneshim-macos-x64.tar.gz -C binaries
          mv binaries/oneshim binaries/oneshim-x64

      - name: Create universal binary
        run: |
          lipo -create binaries/oneshim-arm64 binaries/oneshim-x64 -output binaries/oneshim
          file binaries/oneshim
          mkdir -p dist
          tar -czvf dist/oneshim-macos-universal.tar.gz -C binaries oneshim
          shasum -a 256 dist/oneshim-macos-universal.tar.gz > dist/oneshim-macos-universal.tar.gz.sha256

      - name: Upload universal artifact
        uses: actions/upload-artifact@v6
        with:
          name: oneshim-macos-universal
          path: |
            dist/oneshim-macos-universal.tar.gz
            dist/oneshim-macos-universal.tar.gz.sha256

      - name: Validate macOS signing secret material
        shell: bash
        run: |
          required=(
            MACOS_APP_CERT_P12_B64
            MACOS_APP_CERT_PASSWORD
            MACOS_INSTALLER_CERT_P12_B64
            MACOS_INSTALLER_CERT_PASSWORD
          )
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required secret: $key" >&2
              exit 1
            fi
          done

      - name: Import macOS signing certificates
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/oneshim-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          APP_CERT_PATH="$RUNNER_TEMP/macos-app-cert.p12"
          INSTALLER_CERT_PATH="$RUNNER_TEMP/macos-installer-cert.p12"

          echo "$MACOS_APP_CERT_P12_B64" | base64 --decode > "$APP_CERT_PATH"
          echo "$MACOS_INSTALLER_CERT_P12_B64" | base64 --decode > "$INSTALLER_CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          security import "$APP_CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_APP_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security import "$INSTALLER_CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_INSTALLER_CERT_PASSWORD" \
            -T /usr/bin/productsign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign:,productsign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          echo "APP_CERT_PATH=$APP_CERT_PATH" >> "$GITHUB_ENV"
          echo "INSTALLER_CERT_PATH=$INSTALLER_CERT_PATH" >> "$GITHUB_ENV"

      - name: Resolve macOS signing identities
        shell: bash
        run: |
          set -euo pipefail

          ALL_IDENTITIES="$(security find-identity -v "$KEYCHAIN_PATH" || true)"
          echo "$ALL_IDENTITIES"

          resolve_identity() {
            local kind="$1"
            local requested="$2"
            local resolved=""

            if [[ -n "$requested" ]] && printf '%s\n' "$ALL_IDENTITIES" | grep -F "\"$requested\"" >/dev/null; then
              resolved="$requested"
            else
              resolved="$(printf '%s\n' "$ALL_IDENTITIES" | sed -n "s/.*\"\\($kind: [^\"]*\\)\".*/\\1/p" | head -n1)"
            fi

            printf '%s' "$resolved"
          }

          APP_IDENTITY="$(resolve_identity "Developer ID Application" "${MACOS_APP_SIGNING_IDENTITY:-}")"
          INSTALLER_IDENTITY="$(resolve_identity "Developer ID Installer" "${MACOS_INSTALLER_SIGNING_IDENTITY:-}")"

          if [[ -z "$APP_IDENTITY" ]]; then
            echo "Unable to resolve Developer ID Application identity from imported certificate." >&2
            exit 1
          fi
          if [[ -z "$INSTALLER_IDENTITY" ]]; then
            echo "Unable to resolve Developer ID Installer identity from imported certificate." >&2
            exit 1
          fi

          echo "MACOS_APP_SIGNING_IDENTITY_RESOLVED=$APP_IDENTITY" >> "$GITHUB_ENV"
          echo "MACOS_INSTALLER_SIGNING_IDENTITY_RESOLVED=$INSTALLER_IDENTITY" >> "$GITHUB_ENV"
          echo "Resolved macOS app/installer signing identities."

      - name: Validate macOS icon asset format
        shell: bash
        run: |
          ICON_FILE_INFO="$(file crates/oneshim-app/assets/icon.icns)"
          echo "$ICON_FILE_INFO"
          if [[ "$ICON_FILE_INFO" != *"Mac OS X icon"* ]]; then
            echo "crates/oneshim-app/assets/icon.icns must be a valid ICNS file." >&2
            exit 1
          fi

      - name: Create macOS app bundle
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          APP_BUNDLE="dist/ONESHIM.app"
          mkdir -p "$APP_BUNDLE/Contents/MacOS" "$APP_BUNDLE/Contents/Resources"
          cp binaries/oneshim "$APP_BUNDLE/Contents/MacOS/oneshim"
          chmod +x "$APP_BUNDLE/Contents/MacOS/oneshim"
          cp crates/oneshim-app/assets/icon.icns "$APP_BUNDLE/Contents/Resources/icon.icns"
          cat > "$APP_BUNDLE/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>ONESHIM</string>
            <key>CFBundleDisplayName</key>
            <string>ONESHIM</string>
            <key>CFBundleIdentifier</key>
            <string>com.oneshim.client</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>oneshim</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.15</string>
            <key>CFBundleIconFile</key>
            <string>icon.icns</string>
          </dict>
          </plist>
          EOF

      - name: Verify macOS app bundle version
        shell: bash
        run: |
          EXPECTED_VERSION="${GITHUB_REF#refs/tags/v}"
          BUNDLE_VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" dist/ONESHIM.app/Contents/Info.plist)
          echo "Expected: $EXPECTED_VERSION"
          echo "Bundle:   $BUNDLE_VERSION"
          if [ "$BUNDLE_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::macOS bundle version mismatch: got $BUNDLE_VERSION, expected $EXPECTED_VERSION"
            exit 1
          fi

      - name: Sign and verify macOS app bundle
        shell: bash
        run: |
          codesign --force --deep --options runtime --timestamp \
            --entitlements crates/oneshim-app/assets/oneshim.entitlements \
            --keychain "$KEYCHAIN_PATH" \
            --sign "$MACOS_APP_SIGNING_IDENTITY_RESOLVED" \
            dist/ONESHIM.app
          codesign --verify --deep --strict --verbose=2 dist/ONESHIM.app

      - name: Create DMG installer
        shell: bash
        run: |
          mkdir -p dmg-staging
          cp -R dist/ONESHIM.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "ONESHIM" -srcfolder dmg-staging -ov -format UDZO dist/oneshim-macos-universal-unsigned.dmg

      - name: Create and sign PKG installer
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          UNSIGNED_PKG_TMP="dist/oneshim-macos-universal-pkgbuild-unsigned.pkg"
          pkgbuild \
            --component dist/ONESHIM.app \
            --identifier com.oneshim.client \
            --version "$VERSION" \
            --install-location /Applications \
            "$UNSIGNED_PKG_TMP"
          productsign \
            --keychain "$KEYCHAIN_PATH" \
            --sign "$MACOS_INSTALLER_SIGNING_IDENTITY_RESOLVED" \
            "$UNSIGNED_PKG_TMP" \
            dist/oneshim-macos-universal-unsigned.pkg
          pkgutil --check-signature dist/oneshim-macos-universal-unsigned.pkg
          rm -f "$UNSIGNED_PKG_TMP"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: oneshim-macos-universal-dmg
          path: dist/oneshim-macos-universal-unsigned.dmg
          if-no-files-found: error

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v6
        with:
          name: oneshim-macos-universal-pkg
          path: dist/oneshim-macos-universal-unsigned.pkg
          if-no-files-found: error

      - name: Cleanup macOS signing keychain
        if: always()
        shell: bash
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$APP_CERT_PATH" "$INSTALLER_CERT_PATH"

  release-reliability-smoke:
    name: Release Reliability Smoke (${{ matrix.name }})
    needs: [build-release, build-macos-universal]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            artifact_name: oneshim-linux-x64-archive
            run_updater_tests: true
          - name: macos
            os: macos-latest
            artifact_name: oneshim-macos-universal
            run_updater_tests: false
          - name: windows
            os: windows-latest
            artifact_name: oneshim-windows-x64-archive
            run_updater_tests: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Download release archive for smoke
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: smoke-assets

      - name: Verify downloaded smoke assets
        shell: bash
        run: |
          ls -la smoke-assets
          test -n "$(find smoke-assets -maxdepth 1 -type f)"

      - name: Download macOS installer artifacts for smoke
        if: matrix.name == 'macos'
        uses: actions/download-artifact@v7
        with:
          name: oneshim-macos-universal-dmg
          path: smoke-installers

      - name: Download macOS PKG artifact for smoke
        if: matrix.name == 'macos'
        uses: actions/download-artifact@v7
        with:
          name: oneshim-macos-universal-pkg
          path: smoke-installers

      - name: Verify downloaded macOS installer assets
        if: matrix.name == 'macos'
        shell: bash
        run: |
          find smoke-installers -maxdepth 3 -type f
          test -f smoke-installers/oneshim-macos-universal-unsigned.dmg
          test -f smoke-installers/oneshim-macos-universal-unsigned.pkg

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libnotify-dev \
            libasound2-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libclang-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-reliability-smoke-${{ matrix.name }}

      - name: Run smoke script (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          chmod +x ./scripts/release-reliability-smoke.sh
          if [[ "${{ matrix.run_updater_tests }}" == "true" ]]; then
            ./scripts/release-reliability-smoke.sh --assets-dir smoke-assets
          else
            ./scripts/release-reliability-smoke.sh --assets-dir smoke-assets --skip-updater-tests
          fi

      - name: Run smoke script (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ("${{ matrix.run_updater_tests }}" -eq "true") {
            .\scripts\release-reliability-smoke.ps1 -AssetsDir smoke-assets
          } else {
            .\scripts\release-reliability-smoke.ps1 -AssetsDir smoke-assets -SkipUpdaterTests
          }

      - name: Run macOS installer smoke script
        if: matrix.name == 'macos'
        shell: bash
        run: |
          chmod +x ./scripts/release-installer-smoke-macos.sh
          ./scripts/release-installer-smoke-macos.sh --assets-dir smoke-installers

  create-release:
    name: Create GitHub Release
    needs: [build-release, build-macos-universal, release-reliability-smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: oneshim-*
          path: dist
          merge-multiple: true

      - name: Flatten nested artifacts
        run: |
          # Move installer files from nested paths to dist/
          find dist -mindepth 2 -type f \( -name '*.msi' -o -name '*.deb' -o -name '*.dmg' -o -name '*.pkg' \) -exec mv {} dist/ \;
          # Clean up empty nested directories
          find dist -mindepth 1 -type d -empty -delete

      - name: Verify installer coverage
        run: |
          for pattern in "*.msi" "*.deb" "*.dmg" "*.pkg"; do
            if ! compgen -G "dist/${pattern}" > /dev/null; then
              echo "Missing expected installer artifact: ${pattern}" >&2
              exit 1
            fi
          done

      - name: Verify artifacts
        run: find dist -type f

      - name: Include signed runtime policy bundle
        run: |
          if [ -f "policy/runtime-policy.json" ]; then
            cp "policy/runtime-policy.json" "dist/runtime-policy.json"
            echo "Included runtime policy bundle in release artifacts"
          else
            echo "No runtime policy bundle found; skipping"
          fi

      - name: Generate HTTP OpenAPI snapshot
        run: ./scripts/generate-http-openapi.sh dist/oneshim-web.v1.openapi.yaml

      - name: Ensure checksums exist for all release files
        run: |
          shopt -s nullglob
          for file in dist/*; do
            [ -f "$file" ] || continue
            case "$file" in
              *.sha256|*.sig)
                continue
                ;;
            esac
            shasum -a 256 "$file" > "$file.sha256"
          done

      - name: Install signing dependencies
        run: python3 -m pip install --upgrade pynacl

      - name: Sign release artifacts (Ed25519)
        env:
          UPDATE_SIGNING_PRIVATE_KEY_B64: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY_B64 }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path
          from nacl.signing import SigningKey

          key_b64 = os.environ.get("UPDATE_SIGNING_PRIVATE_KEY_B64", "").strip()
          if not key_b64:
              raise SystemExit("Missing secret: UPDATE_SIGNING_PRIVATE_KEY_B64")

          seed = base64.b64decode(key_b64)
          if len(seed) != 32:
              raise SystemExit(f"UPDATE_SIGNING_PRIVATE_KEY_B64 must decode to 32 bytes, got {len(seed)}")

          signing_key = SigningKey(seed)
          dist = Path("dist")
          signed = 0
          for path in dist.glob("*"):
              if not path.is_file():
                  continue
              if path.suffix in {".sha256", ".sig"}:
                  continue
              payload = path.read_bytes()
              signature = signing_key.sign(payload).signature
              path.with_suffix(path.suffix + ".sig").write_text(base64.b64encode(signature).decode("ascii") + "\n", encoding="utf-8")
              signed += 1

          if signed == 0:
              raise SystemExit("No release artifacts were signed")
          print(f"Signed artifacts: {signed}")
          PY

      - name: Attest release artifacts provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Ensure at least one asset exists
        run: |
          ASSET_COUNT=$(find dist -maxdepth 1 -type f | wc -l | tr -d ' ')
          if [ "$ASSET_COUNT" -eq 0 ]; then
            echo "No release assets were produced."
            exit 1
          fi
          echo "Asset count: $ASSET_COUNT"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_REF#v}"
          # Extract section between ## [$VERSION] and next ## [
          CHANGELOG_SECTION=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '1d;$d' | sed '/^$/d')
          if [ -z "$CHANGELOG_SECTION" ]; then
            CHANGELOG_SECTION="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)"
          fi
          # Write to file for multi-line output
          echo "$CHANGELOG_SECTION" > changelog_section.md

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          CHANGELOG_CONTENT=$(cat changelog_section.md)

          cat > release_notes.md <<NOTES_EOF
          ## What's Changed

          ${CHANGELOG_CONTENT}

          ---

          > **Note:** Initial macOS installers are published as \`*-unsigned.dmg\`/\`*-unsigned.pkg\`.
          > After Apple notarization completes, the release is updated with notarized versions.

          ### Downloads

          | Platform | Architecture | File | Format |
          |----------|-------------|------|--------|
          | macOS | Universal (arm64 + x64) | \`oneshim-macos-universal-unsigned.dmg\` | DMG Installer |
          | macOS | Universal (arm64 + x64) | \`oneshim-macos-universal-unsigned.pkg\` | PKG Installer |
          | macOS | Universal | \`oneshim-macos-universal.tar.gz\` | Binary |
          | macOS | Apple Silicon | \`oneshim-macos-arm64.tar.gz\` | Binary |
          | macOS | Intel | \`oneshim-macos-x64.tar.gz\` | Binary |
          | Windows | x64 | \`oneshim-*.msi\` | MSI Installer |
          | Windows | x64 | \`oneshim-windows-x64.zip\` | Binary |
          | Linux | x64 | \`oneshim-*.deb\` | DEB Package |
          | Linux | x64 | \`oneshim-linux-x64.tar.gz\` | Binary |

          ### Quick Install

          **macOS / Linux:**
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash
          \`\`\`

          **Windows (PowerShell):**
          \`\`\`powershell
          irm https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.ps1 | iex
          \`\`\`

          **Full changelog:** [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          NOTES_EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ONESHIM Client ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
