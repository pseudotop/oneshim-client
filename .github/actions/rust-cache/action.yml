name: Rust cache
description: Cache Cargo registry, installed cargo tools, and target artifacts via actions/cache.

inputs:
  key:
    description: Job-specific cache key suffix
    required: true

runs:
  using: composite
  steps:
    - name: Cache Rust artifacts
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/bin
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-rust-${{ inputs.key }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-rust-${{ inputs.key }}-
          ${{ runner.os }}-rust-
